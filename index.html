<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars AI Coach</title>
</head>
<body>
    <h1>winners project pov</h1>
    <button id="startBtn">1. Share Pigeoncast Window (any broadcasting)</button>
    <br><br>
    <!-- Hidden video element just to capture the stream -->
    <video id="video" autoplay style="max-width: 600px; border: 1px solid black;"></video>
    
    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        let ws;

        // Set up AudioContext to play the raw PCM audio returned by Gemini
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });

        startBtn.onclick = async () => {
            // 1. Ask user to select the Pigeoncast window
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            video.srcObject = stream;

            // 2. Connect to the Python FastAPI server
            ws = new WebSocket("ws://localhost:8000/ws");
            ws.binaryType = "arraybuffer";

            ws.onopen = () => {
                console.log("Connected to Python backend.");
                // Start grabbing frames 2 times a second
                setInterval(sendFrameToBackend, 500); 
            };

            // 3. Handle both audio (binary) and text (JSON) from server
            ws.onmessage = async (event) => {
                if (event.data instanceof ArrayBuffer) {
                    playAudioChunk(event.data);
                } else if (typeof event.data === 'string') {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'coach') {
                        speakCoaching(msg.text);
                    }
                }
            };
        };

        function sendFrameToBackend() {
            if (ws.readyState !== WebSocket.OPEN) return;
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 360;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);
            ws.send(base64Image);
        }

        function playAudioChunk(arrayBuffer) {
            const int16Array = new Int16Array(arrayBuffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) {
                float32Array[i] = int16Array[i] / 32768.0;
            }
            const buffer = audioCtx.createBuffer(1, float32Array.length, 24000);
            buffer.copyToChannel(float32Array, 0);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start();
        }

        // Use browser Text-to-Speech for coaching callouts
        const synth = window.speechSynthesis;
        function speakCoaching(text) {
            // Cancel any ongoing speech so new callouts take priority
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.3;  // Slightly fast for urgency
            utterance.pitch = 1.0;
            synth.speak(utterance);
            console.log("Coach:", text);
        }
    </script>
</body>
</html>
